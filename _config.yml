baseurl: "" # the subpath of your site, e.g. /blog
url: "https://miarofandresena.github.io" # the base hostname & protocol for your site
domain: miarofandresena.github.io

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from
whitelist:
  - jekyll-redirect-from

# Pages Path
defaults:
  - scope:
      path: "_pages"
    values:
      permalink: /:basename:output_ext

include:
  - _pages

sass:
  sass_dir: assets/scss
  style: compressed

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE.text
  - README.md
  - SECURITY.md
