<header class="navigation fixed-top">
  <nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand font-tertiary h3" href="{{ site.baseurl }}/" style="display:flex;align-items:center;gap:.5rem;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="36" height="36" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="#00b4d8"/>
        <text x="16" y="23" font-family="Arial,sans-serif" font-size="19" font-weight="900" text-anchor="middle" fill="#ffffff">M</text>
      </svg>
      <span class="text-white font-tertiary" style="font-size:1.2rem;font-weight:700;">{{site.data.settings.title}}</span>
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navigation"
      aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse text-center" id="navigation">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item active">
          <a class="nav-link" href="{{ site.baseurl }}/">Accueil</a>
        </li>
        {% for link in site.data.settings.menu %}
          <li class="nav-item {{ class }}">
            <a class="nav-link" href="{{ link.link }}">{{ link.name }}</a>
          </li>
        {% endfor %}
        <li class="btn btn-light btn-sm nav-link">
          <a href="/contact" style="text-decoration: none; color:#00b4d8;">DISCUTONS DE VOS PROJETS !<i class="ti-comment"></i></a>
        </li>
      </ul>
    </div>
  </nav>
</header>
